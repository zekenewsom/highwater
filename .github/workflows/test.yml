name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'
          
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Run API tests
        run: cd packages/api && pnpm test:coverage
        
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: packages/api/coverage/lcov.info
          flags: api
          name: api-coverage

  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'
          
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Run web tests
        run: cd packages/web && pnpm test:coverage
        
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: packages/web/coverage/lcov.info
          flags: web
          name: web-coverage

  test-e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: [test-api, test-web]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'
          
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Install Playwright browsers
        run: cd packages/web && npx playwright install --with-deps
        
      - name: Build API
        run: |
          cd packages/api
          pnpm build
          
      - name: Start API server
        run: |
          cd packages/api
          pnpm start &
          sleep 10
          
      - name: Run E2E tests
        run: |
          cd packages/web
          pnpm test:e2e
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          
      - name: Upload Playwright report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: packages/web/playwright-report/
          retention-days: 30

  test-visual:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    needs: [test-api, test-web]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'
          
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Install Playwright browsers
        run: cd packages/web && npx playwright install --with-deps
        
      - name: Build API
        run: |
          cd packages/api
          pnpm build
          
      - name: Start API server
        run: |
          cd packages/api
          pnpm start &
          sleep 10
          
      - name: Run visual regression tests
        run: |
          cd packages/web
          npx playwright test --config=playwright.config.ts --grep="Visual Regression"
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          
      - name: Upload visual test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: visual-test-results
          path: packages/web/test-results/
          retention-days: 30

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'
          
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Run ESLint
        run: pnpm lint
        
      - name: Run TypeScript check
        run: pnpm type-check 